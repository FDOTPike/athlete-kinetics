name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  # Runner JS actions default to Node 20 until 2026-06-16; opt in early so
  # the forced switch can't break CI mid-week.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verification suite (11 gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      # MiniLM (~25 MB) used by verify:semantic + verify:embedder; cached.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: node_modules/@xenova/transformers/.cache
          key: minilm-${{ hashFiles('packages/inference/assets/phrase-codebase.json') }}
          restore-keys: minilm-
      # Materialize the gitignored ONNX into assets/minilm (cache-first,
      # Hugging Face download on a cold cache).
      - name: Fetch embedder assets
        run: npm run fetch:embedder
      - name: verify:all (11 gates)
        run: npm run verify:all
      - name: Seeder physiology â€” pinned alignment + today's alignment
        run: |
          node scripts/seed-db.ts --end=2026-06-10 --db=/tmp/pinned.db
          node scripts/seed-db.ts --db=/tmp/today.db
      - name: Metro production bundle
        working-directory: apps/mobile
        run: |
          mkdir -p build
          npx react-native bundle --platform android --dev false \
            --entry-file index.js \
            --bundle-output build/index.android.bundle \
            --assets-dest build/assets

  android-apk:
    name: Android APK (sideloadable)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      # The triage embedding model ships inside the APK (Android assets);
      # cache-first fetch, then stage it where AGP packages assets from.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: node_modules/@xenova/transformers/.cache
          key: minilm-${{ hashFiles('packages/inference/assets/phrase-codebase.json') }}
          restore-keys: minilm-
      - name: Stage embedder model into Android assets
        run: |
          npm run fetch:embedder
          mkdir -p apps/mobile/android/app/src/main/assets
          cp packages/inference/assets/minilm/model_quantized.onnx \
             apps/mobile/android/app/src/main/assets/minilm.onnx
      # Release variant bundles JS + Hermes bytecode; the RN template signs
      # release with the committed debug keystore, so the artifact installs
      # directly on a phone with "install unknown apps" enabled.
      - name: Build release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: athlete-kinetics-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
